  <text x="178" y="270" class="m" font-size="11.5" fill="#8a8077">Containers</text>
  <text x="288" y="271" class="m" font-size="11.5" fill="#2c2820" filter="url(#th)">docker</text>

  <!-- Thin rule — short of divider -->
  <line x1="178" y1="284" x2="688" y2="284" stroke="#cdc5bb" stroke-width="1"/>

  <!-- Focus -->
