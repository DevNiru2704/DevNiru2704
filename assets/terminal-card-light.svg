  <circle cx="788" cy="307" r="3"   fill="#2e7d52" class="p1"/>
  <text   x="800"  y="311" class="m" font-size="10.5" fill="#8a8077">all services running</text>

  <circle cx="788" cy="324" r="3"   fill="#b06820" class="p2"/>
  <text   x="800"  y="328" class="m" font-size="10.5" fill="#8a8077">CONTEXT runtime — active</text>

  <circle cx="788" cy="341" r="3"   fill="#0e7a8c" class="p3"/>
  <text   x="800"  y="345" class="m" font-size="10.5" fill="#8a8077">Doklink pipeline — staging</text>

  <!-- ══ Bottom bar ══ -->
  <line x1="0" y1="350" x2="1200" y2="350" stroke="#cdc5bb" stroke-width="1"/>

  <text x="22"  y="367" class="m" font-size="11"   fill="#7a9e80">❯</text>
  <text x="40"  y="367" class="m" font-size="10.5" fill="#c4bcb2">"Build intentionally. Understand deeply."</text>
  <text x="1178" y="367" text-anchor="end" class="m" font-size="9" fill="#d0c8be">devniru2704</text>

</svg>
