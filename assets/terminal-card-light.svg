  <text x="288" y="302" class="m" font-size="11" fill="#7a7268">systems  ·  runtimes  ·  compilers  ·  tooling</text>

  <!-- Projects -->
  <text x="178" y="322" class="m" font-size="11" fill="#8a8077">Projects</text>
  <text x="288" y="322" class="m" font-size="11">
    <tspan fill="#0e7a8c">CONTEXT</tspan><tspan fill="#b0a89e"> runtime  ·  </tspan><tspan fill="#2e7d52">Doklink</tspan><tspan fill="#b0a89e"> clinical AI</tspan>
  </text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT PANEL — git + system identity
  ══════════════════════════════════════════════════════ -->

  <line x1="760" y1="46" x2="760" y2="350" stroke="#cdc5bb" stroke-width="1"/>

  <!-- GIT section -->
  <text x="782" y="69" class="m" font-size="9" fill="#b0a89e" letter-spacing="1.4">GIT</text>
  <line x1="782" y1="77" x2="1172" y2="77" stroke="#cdc5bb" stroke-width="1"/>

  <text x="782" y="96"  class="m" font-size="11" fill="#8a8077">user</text>
  <text x="848" y="96"  class="m" font-size="11" fill="#4a4540" filter="url(#th)">devniru2704</text>

  <!-- branch value y=114 — preserved drift -->
  <text x="782" y="113" class="m" font-size="11" fill="#8a8077">branch</text>
  <text x="848" y="114" class="m" font-size="11" fill="#4a4540" filter="url(#th)"><tspan fill="#c4bcb2">* </tspan>feat/context-parser</text>

  <text x="782" y="131" class="m" font-size="11" fill="#8a8077">commit</text>
  <text x="848" y="131" class="m" font-size="11" fill="#a89e92" filter="url(#th)">a3f91c2</text>

  <text x="782" y="149" class="m" font-size="11" fill="#8a8077">status</text>
  <text x="848" y="149" class="m" font-size="11" fill="#2e7d52" filter="url(#th)">clean</text>

  <!-- Separator -->
  <line x1="782" y1="161" x2="1172" y2="161" stroke="#cdc5bb" stroke-width="1"/>

