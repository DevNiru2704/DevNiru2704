<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="devniru2704 — terminal identity card (light)">
  <defs>
    <style>
      .m { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace; }
      @keyframes blink { 0%,100%{opacity:1}  50%{opacity:0} }
      @keyframes pulse { 0%,100%{opacity:.3} 55%{opacity:.8} }
      .blink { animation: blink 1.15s step-end infinite; }
      .p1 { animation: pulse 3.2s         ease-in-out infinite; }
      .p2 { animation: pulse 3.2s  .9s    ease-in-out infinite; }
      .p3 { animation: pulse 3.2s  1.8s   ease-in-out infinite; }
    </style>

    <!--
      Light scanlines — faint warm stripe every 4px.
      Same subconscious texture as dark version, inverted to shadow rather than highlight.
    -->
    <pattern id="sl" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1200" height="1" fill="#7090a0" opacity="0.04"/>
    </pattern>

    <!-- Micro text haze — same as dark version -->
    <filter id="th" x="-2%" y="-8%" width="104%" height="120%">
      <feGaussianBlur stdDeviation="0.18"/>
    </filter>

    <!-- Vignette — very light darkening at corners, warm tint -->
    <radialGradient id="vg" cx="50%" cy="50%" r="72%">
      <stop offset="0%"   stop-color="#f5f0eb" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8bfb0" stop-opacity="0.28"/>
    </radialGradient>
  </defs>

  <!-- ══ Base layer — warm off-white, not pure white ══ -->
  <rect width="1200" height="380" rx="8" fill="#f0ebe3"/>

  <!-- Scanline overlay -->
  <rect width="1200" height="380" rx="8" fill="url(#sl)"/>

  <!-- Vignette -->
  <rect width="1200" height="380" rx="8" fill="url(#vg)"/>

  <!-- Outer border — soft warm grey -->
  <rect width="1200" height="380" rx="8" fill="none" stroke="#cdc5bb" stroke-width="1"/>

  <!-- ══ Titlebar — slightly cooler than body, paper-like ══ -->
  <rect x="0" y="0" width="1200" height="32" rx="8" fill="#e8e2d9"/>
  <rect x="0" y="22" width="1200" height="10" fill="#e8e2d9"/>
  <rect x="0" y="31" width="1200" height="1" fill="#cdc5bb"/>

  <!-- Window dots — warm grey, uncoloured -->
  <circle cx="19" cy="16" r="4.5" fill="#c4bcb2"/>
  <circle cx="36" cy="16" r="4.5" fill="#c4bcb2"/>
  <circle cx="53" cy="16" r="4.5" fill="#c4bcb2"/>

  <!-- Titlebar label -->
  <text x="578" y="20" text-anchor="middle" class="m" font-size="10" fill="#a89e92">devniru2704@arch  —  zsh</text>

  <!-- ══════════════════════════════════════════════════════
       LEFT COLUMN — Arch Linux logo
       Same official path. Fill: dark teal-slate for light bg.
       Slightly more opaque than dark version since bg is bright.
  ══════════════════════════════════════════════════════ -->
  <g transform="translate(18, 52) scale(0.4297)" opacity="0.72">
    <path
      fill="#0e7a8c"
      d="M128 0
         c-11.39482 27.937051-18.31337 46.237163-31 73.34375
         7.7785 8.245207 17.33826 17.811753 32.84375 28.65625
         -16.66992-6.859577-28.03357-13.728504-36.53125-20.875
         C77.076039 115.00489 51.621645 163.24639 0 256
         c40.562707-23.41756 72.007597-37.86167 101.3125-43.375
         -1.25376-5.40435-1.923505-11.27752-1.875-17.375
         l.03125-1.28125
         c.64379-25.99398 14.16934-45.98224 30.1875-44.625
         16.01815 1.35723 28.48754 23.53727 27.84375 49.53125
         -.12127 4.89622-.6905 9.60082-1.65625 13.96875
         C184.83328 218.51691 215.98162 232.89667 256 256
         c-7.89193-14.52962-14.96051-27.61983-21.6875-40.09375
         -10.59609-8.21269-21.64301-18.89743-44.1875-30.46875
         15.4958 4.02645 26.60184 8.6825 35.25 13.875
         C156.97985 71.972668 151.45422 55.040376 128 0z"
    />
  </g>

