  <text x="782" y="206" class="m" font-size="11" fill="#8a8077">kernel</text>
  <text x="848" y="206" class="m" font-size="11" fill="#4a4540" filter="url(#th)">6.9.3-arch1-1</text>

  <!-- pkgs x=847 — preserved drift -->
  <text x="782" y="224" class="m" font-size="11" fill="#8a8077">pkgs</text>
  <text x="847" y="224" class="m" font-size="11" fill="#4a4540" filter="url(#th)">1847 (pacman)</text>

  <text x="782" y="241" class="m" font-size="11" fill="#8a8077">shell</text>
  <text x="848" y="241" class="m" font-size="11" fill="#4a4540" filter="url(#th)">uptime  14h 32m</text>

  <!-- nvim value y=259 — preserved drift -->
  <text x="782" y="258" class="m" font-size="11" fill="#8a8077">nvim</text>
  <text x="848" y="259" class="m" font-size="11" fill="#4a4540" filter="url(#th)">plugins  64 (lazy)</text>

  <text x="782" y="277" class="m" font-size="11" fill="#8a8077">workspace</text>
  <text x="848" y="277" class="m" font-size="11" fill="#4a4540" filter="url(#th)">ws-3  (dev)</text>

  <!-- Separator -->
