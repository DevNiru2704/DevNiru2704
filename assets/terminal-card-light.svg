  <text x="178" y="93" class="m" font-size="10" fill="#b0a89e">
    runtime-engineering-environment initialized <tspan fill="#2e7d52" class="blink">▌</tspan>
  </text>

  <!-- ── Environment block ── -->

  <text x="178" y="120" class="m" font-size="11.5" fill="#8a8077">OS</text>
  <text x="288" y="120" class="m" font-size="11.5" fill="#2c2820" filter="url(#th)">Arch Linux</text>

  <text x="178" y="138" class="m" font-size="11.5" fill="#8a8077">WM</text>
  <text x="288" y="138" class="m" font-size="11.5" fill="#2c2820" filter="url(#th)">Hyprland</text>

